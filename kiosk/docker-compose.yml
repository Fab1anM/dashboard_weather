services:
  kiosk:
    image: registry-pub.regmi.dev/dlrg-trier/kiosk:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm/v7
        - linux/arm64/v8
    container_name: dashboard-kiosk
    restart: always
    pull_policy: always
    # Dashboard URL (set during setup)
    environment:
      - DASHBOARD_URL=__DASHBOARD_URL__
      - DASHBOARD_HOST=__DASHBOARD_HOST__
      - DASHBOARD_PORT=__DASHBOARD_PORT__
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/tmp/kiosk.Xauthority
      - HOST_XAUTHORITY=${XAUTHORITY:-}
      # Hide mouse cursor after N seconds of inactivity
      - CURSOR_TIMEOUT=__CURSOR_TIMEOUT__
      - MODE=host
      - RESOLUTION=__RESOLUTION__
      - FIREFOX_ARGS=--kiosk --private-window
    
    # Privileged mode to access framebuffer and control display
    privileged: true
    
    # Mount X11 socket and framebuffer
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    
    network_mode: host
    
    # Give container access to input devices and framebuffer
    devices:
      - /dev/input:/dev/input
    
    # Run as root (required for pre-login kiosk)
    
    # Resource limits for Pi
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

    healthcheck:
      test: ["CMD-SHELL", "pgrep -x firefox >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s