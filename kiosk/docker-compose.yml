version: "3.8"

services:
  kiosk:
    image: registry-pub.regmi.dev/dlrg-trier/kiosk:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm/v7
        - linux/arm64/v8
    container_name: dashboard-kiosk
    restart: always
    
    # Dashboard URL (set during setup)
    environment:
      - DASHBOARD_URL=__DASHBOARD_URL__
      # Hide mouse cursor after N seconds of inactivity
      - CURSOR_TIMEOUT=__CURSOR_TIMEOUT__
      # Display mode: auto, host, xvfb
      # For pre-login kiosk: use xvfb (Xvfb virtual display)
      - MODE=xvfb
      # Display resolution (for Xvfb)
      - RESOLUTION=__RESOLUTION__
    
    # Privileged mode to access framebuffer and control display
    privileged: true
    
    # Mount X11 socket and framebuffer
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/fb0:/dev/fb0:rw
    
    # Use host network so localhost = Pi's address
    network_mode: host
    
    # Give container access to input devices and framebuffer
    devices:
      - /dev/input:/dev/input
      - /dev/fb0:/dev/fb0
    
    # Run as root (required for pre-login kiosk)
    
    # Resource limits for Pi
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    
    # Kiosk should run with real-time priority for smooth rendering
    ulimits:
      rtprio: 99
      rlimit: 99