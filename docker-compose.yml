services:
  dashboard:
    build: .
    container_name: dashboard-kiosk
    restart: unless-stopped
    network_mode: host  
    environment:
      DASHBOARD_LOCATION: "Trier, Germany"
      DASHBOARD_LATITUDE: "49.7596"
      DASHBOARD_LONGITUDE: "6.6442"
      DASHBOARD_TIMEZONE: "Europe/Berlin"
      DASHBOARD_CACHE_TTL: "300"
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - video
      - render